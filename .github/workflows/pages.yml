name: Deploy web preview

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "src/injectguard/web/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure scanning service URL
        env:
          API_BASE_URL: ${{ vars.INJECTGUARD_API_BASE_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          value = os.environ.get("API_BASE_URL", "").rstrip("/")
          Path("src/injectguard/web/config.js").write_text(
              "window.INJECTGUARD_CONFIG = "
              + json.dumps({"apiBaseUrl": value})
              + ";\n",
              encoding="utf-8",
          )
          PY
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload web interface
        uses: actions/upload-pages-artifact@v4
        with:
          path: src/injectguard/web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
